version: "3.9"

services:

  db:
    image: postgres:16
    container_name: url_shortener_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: hk04
      POSTGRES_DB: shortener_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: url_shortener_api

    depends_on:
      - db

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://postgres:hk04@db:5432/shortener_db
      SECRET_KEY: mysupersecretkey123456
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      BASE_URL: http://127.0.0.1:8000

volumes:
  postgres_data: